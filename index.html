<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>강아지 갤러리</title>
    <meta
      name="description"
      content="귀여운 강아지 사진 세 장을 담은 감성 갤러리 페이지"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=SUIT:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Puppy Moments</p>
        <h1>강아지 사진 3장 갤러리</h1>
        <p class="intro">
          햇살, 산책, 그리고 졸린 표정까지. 보고 있으면 기분이 좋아지는
          강아지 순간들을 한 장씩 담아봤어요.
        </p>
      </section>

      <section class="gallery" aria-label="강아지 사진 갤러리">
        <article class="card card-tall">
          <img
            src="https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&w=900&q=80"
            alt="혀를 내밀고 웃는 갈색 강아지"
          />
          <div class="card-copy">
            <span class="tag">Smile</span>
            <h2>웃는 얼굴</h2>
            <p>반가운 사람을 만난 것처럼 환하게 웃는 순간.</p>
          </div>
        </article>

        <article class="card">
          <img
            src="https://images.unsplash.com/photo-1518717758536-85ae29035b6d?auto=format&fit=crop&w=900&q=80"
            alt="잔디 위에 앉아 있는 하얀 강아지"
          />
          <div class="card-copy">
            <span class="tag">Sunny Day</span>
            <h2>햇살 산책</h2>
            <p>포근한 낮빛 아래에서 여유롭게 쉬는 시간.</p>
          </div>
        </article>

        <article class="card">
          <img
            src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&w=900&q=80"
            alt="담요 위에서 졸고 있는 작은 강아지"
          />
          <div class="card-copy">
            <span class="tag">Nap Time</span>
            <h2>졸린 오후</h2>
            <p>가장 편안한 자리를 찾은 뒤 스르르 잠드는 모습.</p>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
